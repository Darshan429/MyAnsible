---
- name: Deploy to Tomcat
  hosts: web
  become: yes

  tasks:
    - name: Copy WAR file to Tomcat
      copy:
        src: ../target/MyAnsible.war
        dest: /opt/tomcat/webapps/MyAnsible.war
        remote_src: no

    - name: Restart Tomcat
      shell: |
        /opt/tomcat/bin/shutdown.sh
        sleep 5
        /opt/tomcat/bin/startup.sh
